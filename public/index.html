<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payroll • Weekly Time Sheet</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <div class="header-left">
      <h1>Payroll <span class="dot">•</span> Weekly Time Sheet</h1>
    </div>
    
    <div class="header-actions">
      <button onclick="resetearSemanaActual()" class="btn btn-secondary">
        🔄 Semana Actual
      </button>
      <button onclick="verSemanasGuardadas()" class="btn btn-secondary">
        📋 Ver Guardadas
      </button>
      <button onclick="guardarSemana()" class="btn btn-primary">
        💾 Guardar Semana
      </button>
      <button onclick="descargar()" class="btn btn-success">
        ⬇ Exportar PNG
      </button>
    </div>
  </header>

  <div class="container">
    <div class="card-main" id="capture">
      
      <div class="info-bar">
        <div class="info-group">
          <div class="info-item">
            <label>Employee</label>
            <input type="text" id="employee" value="Cristian Farez" readonly>
          </div>
          <div class="info-item">
            <label>Period</label>
            <input type="text" id="month" readonly>
          </div>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="tabla">
          <thead>
            <tr>
              <th>Date</th>
              <th>Place / Location</th>
              <th>Notes / Task</th>
              <th>Time</th>
              <th>Hours</th>
            </tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>

      <div class="total-row" id="total-row">
        <div class="total-content">
          <span class="total-label">Total Hours</span>
          <span id="total" class="total-value" data-total="0">0.0</span>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
